name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
      - run: |
          cd dist
          zip -r ../wallfu-${{ github.ref_name }}.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: wallfu-*.zip
          generate_release_notes: true
