<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WallFu</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        width: 100%;
        height: 100%;
        font-family: "Courier New", monospace;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        color: #fff;
        background: rgba(0, 0, 0, 0.72);
        z-index: 10;
      }
      .overlay.visible {
        display: flex;
      }
      .overlay h1 {
        font-size: 56px;
        letter-spacing: 6px;
        margin: 0 0 10px 0;
      }
      .overlay h1 .cyan { color: #2ee6ff; }
      .overlay h1 .magenta { color: #ff2e88; }

      .btn {
        font-family: inherit;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 1px;
        color: #fff;
        background: #111;
        border: 3px solid #fff;
        padding: 12px 28px;
        cursor: pointer;
        min-width: 260px;
      }
      .btn:hover { background: #2ee6ff; color: #000; }
      .btn:active { background: #ff2e88; }

      .row {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 18px;
      }
      .row .btn {
        min-width: 44px;
        padding: 6px 14px;
        font-size: 18px;
      }

      #editor-toolbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: none;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.75);
        border-bottom: 3px solid #fff;
        z-index: 10;
      }
      #editor-toolbar.visible { display: flex; }
      #editor-toolbar .btn {
        min-width: unset;
        padding: 8px 14px;
        font-size: 14px;
      }
      #editor-toolbar .btn.active {
        background: #ffe14d;
        color: #000;
      }
      #editor-hint {
        color: #aaa;
        font-size: 13px;
        margin-left: auto;
      }

      #bindings-grid {
        display: grid;
        grid-template-columns: auto auto auto;
        gap: 6px 18px;
        align-items: center;
        max-height: 60vh;
        overflow-y: auto;
        font-size: 16px;
      }
      #bindings-grid .grid-head {
        font-weight: 700;
        color: #ffe14d;
        padding-bottom: 4px;
      }
      #bindings-grid .key-btn {
        font-family: inherit;
        font-size: 15px;
        font-weight: 700;
        color: #fff;
        background: #111;
        border: 2px solid #888;
        padding: 4px 12px;
        min-width: 70px;
        cursor: pointer;
      }
      #bindings-grid .key-btn:hover { border-color: #2ee6ff; }
      #bindings-grid .key-btn.listening {
        background: #ffe14d;
        color: #000;
        border-color: #ffe14d;
      }

      /* Small screens: tighter menus so everything stays on screen. */
      @media (max-width: 700px), (max-height: 500px) {
        .overlay { gap: 10px; }
        .overlay h1 { font-size: 34px; letter-spacing: 3px; }
        .btn { font-size: 16px; padding: 8px 16px; min-width: 200px; }
        .row { font-size: 15px; gap: 8px; }
        .row .btn { min-width: 36px; padding: 4px 10px; font-size: 15px; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="menu" class="overlay visible">
      <h1><span class="cyan">Wall</span><span class="magenta">Fu</span></h1>
      <button class="btn" id="menu-play">2 Players</button>
      <button class="btn" id="menu-play-ai">Play vs AI</button>
      <button class="btn" id="menu-editor">Map Editor</button>
      <button class="btn" id="menu-options">Options</button>
    </div>

    <div id="options" class="overlay">
      <h1>Options</h1>
      <div class="row">
        <span>Rounds to win</span>
        <button class="btn" id="opt-rounds-down">-</button>
        <span id="opt-rounds-value">2</span>
        <button class="btn" id="opt-rounds-up">+</button>
      </div>
      <div class="row">
        <span>Screen shake</span>
        <button class="btn" id="opt-shake-down">-</button>
        <span id="opt-shake-value">100%</span>
        <button class="btn" id="opt-shake-up">+</button>
      </div>
      <div class="row">
        <span>Sound volume</span>
        <button class="btn" id="opt-volume-down">-</button>
        <span id="opt-volume-value">70%</span>
        <button class="btn" id="opt-volume-up">+</button>
      </div>
      <div class="row">
        <span>AI difficulty</span>
        <button class="btn" id="opt-ai-down">-</button>
        <span id="opt-ai-value">Medium</span>
        <button class="btn" id="opt-ai-up">+</button>
      </div>
      <button class="btn" id="opt-keys">Configure Keys</button>
      <button class="btn" id="opt-fullscreen">Toggle Fullscreen</button>
      <button class="btn" id="opt-back">Back</button>
    </div>

    <div id="controls" class="overlay">
      <h1>Key Bindings</h1>
      <div id="bindings-grid"></div>
      <div class="row">
        <button class="btn" id="keys-reset">Reset Defaults</button>
        <button class="btn" id="keys-back">Back</button>
      </div>
    </div>

    <div id="editor-toolbar">
      <button class="btn active" id="ed-tool-platform">Platform</button>
      <button class="btn" id="ed-tool-wall">Wall</button>
      <button class="btn" id="ed-tool-spawn1">P1 Spawn</button>
      <button class="btn" id="ed-tool-spawn2">P2 Spawn</button>
      <button class="btn" id="ed-tool-erase">Erase</button>
      <button class="btn" id="ed-undo">Undo</button>
      <button class="btn" id="ed-clear">Clear</button>
      <button class="btn" id="ed-bg">Background</button>
      <button class="btn" id="ed-bg-clear">Clear BG</button>
      <button class="btn" id="ed-save">Save</button>
      <button class="btn" id="ed-load">Load</button>
      <button class="btn" id="ed-export">Export JSON</button>
      <button class="btn" id="ed-import">Import JSON</button>
      <button class="btn" id="ed-play">Play This Map</button>
      <button class="btn" id="ed-back">Back to Menu</button>
      <span id="editor-hint">Drag to draw. Click Erase then a shape to delete it.</span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
